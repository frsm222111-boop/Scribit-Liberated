<?xml version="1.0" encoding="UTF-8"?>
<svg width="100mm" height="400mm" viewBox="0 0 100 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Three vertical lines, each 100mm, stacked with 50mm gaps -->

  <!-- Line 1: Y from 0 to 100 -->
  <path d="M 50 0 L 50 100" stroke="black" stroke-width="1" fill="none"/>

  <!-- Line 2: Y from 150 to 250 (50mm gap) -->
  <path d="M 50 150 L 50 250" stroke="black" stroke-width="1" fill="none"/>

  <!-- Line 3: Y from 300 to 400 (50mm gap) -->
  <path d="M 50 300 L 50 400" stroke="black" stroke-width="1" fill="none"/>
</svg>
