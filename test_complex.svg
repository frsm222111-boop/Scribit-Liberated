<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Bezier curve smile (red) -->
  <path d="M 100 150 Q 150 200, 200 150" stroke="red" fill="none" stroke-width="3"/>
  
  <!-- Circle eyes (black) -->
  <path d="M 130 100 A 10 10 0 1 0 130.001 100 Z" stroke="black" fill="none" stroke-width="2"/>
  <path d="M 170 100 A 10 10 0 1 0 170.001 100 Z" stroke="black" fill="none" stroke-width="2"/>
  
  <!-- Curved eyebrows (blue) -->
  <path d="M 110 80 Q 130 70, 150 80" stroke="blue" fill="none" stroke-width="2"/>
  <path d="M 150 80 Q 170 70, 190 80" stroke="blue" fill="none" stroke-width="2"/>
  
  <!-- Face outline (green) -->
  <path d="M 150 50 C 200 50, 250 100, 250 150 C 250 200, 200 250, 150 250 C 100 250, 50 200, 50 150 C 50 100, 100 50, 150 50 Z" stroke="green" fill="none" stroke-width="3"/>
</svg>